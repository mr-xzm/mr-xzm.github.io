<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f0f7ff 0%, #e1eeff 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(26, 109, 204, 0.15);
            overflow: hidden;
            margin: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #1a6dcc 0%, #0d4a9e 100%);
            color: white;
            padding: 50px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header:before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: rotate(30deg);
        }
        
        .error-icon {
            font-size: 8rem;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            animation: float 3s ease-in-out infinite;
        }
        
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
            letter-spacing: 5px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .error-title {
            font-size: 2.2rem;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }
        
        .content {
            padding: 50px 40px;
            position: relative;
        }
        
        .description {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #555;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }
        
        .reasons {
            background: #f8fafd;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 40px;
            text-align: left;
            max-width: 500px;
            margin: 0 auto 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        
        .reasons h3 {
            color: #0d4a9e;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.3rem;
        }
        
        .reasons ul {
            list-style-type: none;
        }
        
        .reasons li {
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
        }
        
        .reasons li:before {
            content: '';
            position: absolute;
            left: 0;
            top: 7px;
            width: 18px;
            height: 18px;
            background: #1a6dcc;
            border-radius: 50%;
        }
        
        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 15px 35px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            border: none;
            min-width: 200px;
            justify-content: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1a6dcc 0%, #0d4a9e 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(26, 109, 204, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #0d4a9e;
            border: 2px solid #0d4a9e;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(26, 109, 204, 0.4);
        }
        
        .btn i {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        
        .search-box {
            max-width: 500px;
            margin: 30px auto;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 16px 20px;
            padding-right: 60px;
            border: 2px solid #eaeff5;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            border-color: #1a6dcc;
            outline: none;
            box-shadow: 0 5px 15px rgba(26, 109, 204, 0.1);
        }
        
        .search-box button {
            position: absolute;
            right: 5px;
            top: 5px;
            background: #1a6dcc;
            color: white;
            border: none;
            border-radius: 50px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .search-box button:hover {
            background: #0d4a9e;
            transform: scale(1.05);
        }
        
        footer {
            text-align: center;
            padding: 30px;
            background: #f0f5ff;
            color: #666;
            font-size: 1rem;
            width: 100%;
        }
        
        .footer-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .footer-links a {
            color: #1a6dcc;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .footer-links a:hover {
            color: #0d4a9e;
            text-decoration: underline;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        
        @media (max-width: 768px) {
            .error-icon {
                font-size: 6rem;
            }
            
            .error-code {
                font-size: 4rem;
            }
            
            .error-title {
                font-size: 1.8rem;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .btn {
                min-width: 100%;
            }
            
            .actions {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="error-icon">
                <i class="fas fa-compass"></i>
            </div>
            <div class="error-code">404</div>
            <h1 class="error-title">页面未找到</h1>
        </div>
        
        <div class="content">
            <p class="description">
                您正在寻找的页面可能已被移除、重命名或暂时不可用。
                请检查URL是否正确，或尝试搜索您需要的内容。
            </p>
            
            <div class="search-box">
                <input type="text" placeholder="搜索网站内容...">
                <button>
                    <i class="fas fa-search"></i>
                </button>
            </div>
            
            <div class="reasons">
                <h3><i class="fas fa-question-circle"></i> 可能的原因</h3>
                <ul>
                    <li>URL地址输入错误</li>
                    <li>页面已被移除或重命名</li>
                    <li>链接已失效</li>
                    <li>页面暂时不可用</li>
                </ul>
            </div>
            
            <div class="actions">
                <a href="#" class="btn btn-primary">
                    <i class="fas fa-home"></i> 返回首页
                </a>
                <a href="#" class="btn btn-secondary">
                    <i class="fas fa-history"></i> 返回上一页
                </a>
            </div>
        </div>
        
        <footer>
            <p>© 2024 网站名称 | 您需要的页面未找到</p>
            <div class="footer-links">
                <a href="#"><i class="fas fa-file-alt"></i> 服务条款</a>
                <a href="#"><i class="fas fa-shield-alt"></i> 隐私政策</a>
                <a href="#"><i class="fas fa-headset"></i> 联系我们</a>
                <a href="#"><i class="fas fa-sitemap"></i> 网站地图</a>
            </div>
        </footer>
    </div>
    
    <script>
        // 简单的搜索功能
        document.querySelector('.search-box button').addEventListener('click', function() {
            const searchTerm = document.querySelector('.search-box input').value;
            if (searchTerm.trim() !== '') {
                alert(`搜索: ${searchTerm}\n此功能在示例中为演示用途，实际网站中会执行真正的搜索。`);
            }
        });
        
        // 按回车键也可以搜索
        document.querySelector('.search-box input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.querySelector('.search-box button').click();
            }
        });
    </script>
</body>
</html>
