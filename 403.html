<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 禁止访问</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #fff8f0 0%, #ffefe1 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255, 152, 0, 0.15);
            overflow: hidden;
            margin: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #ff9800 0%, #e68a00 100%);
            color: white;
            padding: 50px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header:before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: rotate(30deg);
        }
        
        .error-icon {
            font-size: 8rem;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            animation: shake 0.8s ease-in-out infinite;
        }
        
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
            letter-spacing: 5px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .error-title {
            font-size: 2.2rem;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }
        
        .content {
            padding: 50px 40px;
            position: relative;
        }
        
        .description {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #555;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }
        
        .reasons {
            background: #fffaf3;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 40px;
            text-align: left;
            max-width: 500px;
            margin: 0 auto 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border-left: 5px solid #ff9800;
        }
        
        .reasons h3 {
            color: #e68a00;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.3rem;
        }
        
        .reasons ul {
            list-style-type: none;
        }
        
        .reasons li {
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
        }
        
        .reasons li:before {
            content: '';
            position: absolute;
            left: 0;
            top: 7px;
            width: 18px;
            height: 18px;
            background: #ff9800;
            border-radius: 50%;
        }
        
        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 15px 35px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            border: none;
            min-width: 200px;
            justify-content: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff9800 0%, #e68a00 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 152, 0, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #e68a00;
            border: 2px solid #ff9800;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 152, 0, 0.4);
        }
        
        .btn i {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        
        .account-options {
            max-width: 500px;
            margin: 30px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .account-option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #fffaf3;
            border-radius: 10px;
            text-align: left;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .account-option:hover {
            transform: translateX(5px);
            background: #fff0e1;
        }
        
        .account-option i {
            font-size: 1.5rem;
            margin-right: 15px;
            color: #ff9800;
            width: 40px;
            text-align: center;
        }
        
        .account-text h4 {
            color: #e68a00;
            margin-bottom: 5px;
        }
        
        .account-text p {
            color: #777;
            font-size: 0.95rem;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            background: #fffaf3;
            color: #666;
            font-size: 1rem;
            width: 100%;
        }
        
        .footer-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .footer-links a {
            color: #e68a00;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .footer-links a:hover {
            color: #d17d00;
            text-decoration: underline;
        }
        
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        
        @media (max-width: 768px) {
            .error-icon {
                font-size: 6rem;
            }
            
            .error-code {
                font-size: 4rem;
            }
            
            .error-title {
                font-size: 1.8rem;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .btn {
                min-width: 100%;
            }
            
            .actions {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="error-icon">
                <i class="fas fa-ban"></i>
            </div>
            <div class="error-code">403</div>
            <h1 class="error-title">禁止访问</h1>
        </div>
        
        <div class="content">
            <p class="description">
                抱歉，您没有权限访问此资源。如果您认为这是个错误，请联系管理员或尝试使用其他账户登录。
            </p>
            
            <div class="reasons">
                <h3><i class="fas fa-exclamation-triangle"></i> 可能的原因</h3>
                <ul>
                    <li>您的账户没有访问权限</li>
                    <li>需要特定用户角色才能访问</li>
                    <li>您的IP地址被阻止</li>
                    <li>访问被服务器拒绝</li>
                </ul>
            </div>
            
            <div class="account-options">
                <div class="account-option">
                    <i class="fas fa-sign-in-alt"></i>
                    <div class="account-text">
                        <h4>使用其他账户登录</h4>
                        <p>您可能没有使用具有足够权限的账户</p>
                    </div>
                </div>
                
                <div class="account-option">
                    <i class="fas fa-user-plus"></i>
                    <div class="account-text">
                        <h4>请求访问权限</h4>
                        <p>联系管理员请求此资源的访问权限</p>
                    </div>
                </div>
            </div>
            
            <div class="actions">
                <a href="#" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> 重新登录
                </a>
                <a href="#" class="btn btn-secondary">
                    <i class="fas fa-envelope"></i> 联系管理员
                </a>
            </div>
        </div>
        
        <footer>
            <p>© 2024 网站名称 | 访问被拒绝</p>
            <div class="footer-links">
                <a href="#"><i class="fas fa-file-alt"></i> 服务条款</a>
                <a href="#"><i class="fas fa-shield-alt"></i> 隐私政策</a>
                <a href="#"><i class="fas fa-headset"></i> 联系我们</a>
                <a href="#"><i class="fas fa-key"></i> 权限申请</a>
            </div>
        </footer>
    </div>
    
    <script>
        // 账户选项点击事件
        document.querySelectorAll('.account-option').forEach(option => {
            option.addEventListener('click', function() {
                const title = this.querySelector('h4').textContent;
                alert(`您选择了: ${title}\n此功能在示例中为演示用途，实际网站中会执行相应的操作。`);
            });
        });
    </script>
</body>
</html>
