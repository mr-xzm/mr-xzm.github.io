<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 服务器错误</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #fff0f0 0%, #ffe6e6 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(244, 67, 54, 0.15);
            overflow: hidden;
            margin: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
            padding: 50px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header:before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: rotate(30deg);
        }
        
        .error-icon {
            font-size: 8rem;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
            letter-spacing: 5px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .error-title {
            font-size: 2.2rem;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }
        
        .content {
            padding: 50px 40px;
            position: relative;
        }
        
        .description {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #555;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }
        
        .reasons {
            background: #fff5f5;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 40px;
            text-align: left;
            max-width: 500px;
            margin: 0 auto 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border-left: 5px solid #f44336;
        }
        
        .reasons h3 {
            color: #d32f2f;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.3rem;
        }
        
        .reasons ul {
            list-style-type: none;
        }
        
        .reasons li {
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
        }
        
        .reasons li:before {
            content: '';
            position: absolute;
            left: 0;
            top: 7px;
            width: 18px;
            height: 18px;
            background: #f44336;
            border-radius: 50%;
        }
        
        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 15px 35px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            border: none;
            min-width: 200px;
            justify-content: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(244, 67, 54, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #d32f2f;
            border: 2px solid #f44336;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(244, 67, 54, 0.4);
        }
        
        .btn i {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        
        .status-container {
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            background: #fff5f5;
            border-radius: 10px;
            text-align: left;
        }
        
        .status-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .status-icon {
            font-size: 2rem;
            color: #f44336;
            margin-right: 15px;
        }
        
        .status-title {
            color: #d32f2f;
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .status-bar {
            height: 10px;
            background: #ffe0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .status-progress {
            height: 100%;
            width: 60%;
            background: linear-gradient(90deg, #f44336, #d32f2f);
            border-radius: 5px;
            animation: progress 2s ease-in-out infinite;
        }
        
        .status-info {
            color: #777;
            font-size: 0.95rem;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            background: #fff5f5;
            color: #666;
            font-size: 1rem;
            width: 100%;
        }
        
        .footer-links {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .footer-links a {
            color: #d32f2f;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .footer-links a:hover {
            color: #b71c1c;
            text-decoration: underline;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        @keyframes progress {
            0% { width: 60%; }
            50% { width: 70%; }
            100% { width: 60%; }
        }
        
        @media (max-width: 768px) {
            .error-icon {
                font-size: 6rem;
            }
            
            .error-code {
                font-size: 4rem;
            }
            
            .error-title {
                font-size: 1.8rem;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .btn {
                min-width: 100%;
            }
            
            .actions {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="error-icon">
                <i class="fas fa-server"></i>
            </div>
            <div class="error-code">500</div>
            <h1 class="error-title">服务器错误</h1>
        </div>
        
        <div class="content">
            <p class="description">
                抱歉，服务器遇到内部错误，无法完成您的请求。我们的技术团队已收到通知，正在努力解决问题。
            </p>
            
            <div class="reasons">
                <h3><i class="fas fa-bug"></i> 可能的原因</h3>
                <ul>
                    <li>服务器配置问题</li>
                    <li>脚本执行错误</li>
                    <li>数据库连接失败</li>
                    <li>资源超载或维护中</li>
                </ul>
            </div>
            
            <div class="status-container">
                <div class="status-header">
                    <div class="status-icon">
                        <i class="fas fa-tools"></i>
                    </div>
                    <h3 class="status-title">我们正在努力修复问题</h3>
                </div>
                <div class="status-bar">
                    <div class="status-progress"></div>
                </div>
                <p class="status-info">我们的工程师正在紧急修复此问题。请稍后再试，或联系技术支持获取更多信息。</p>
            </div>
            
            <div class="actions">
                <a href="#" class="btn btn-primary">
                    <i class="fas fa-redo"></i> 重新加载
                </a>
                <a href="#" class="btn btn-secondary">
                    <i class="fas fa-headset"></i> 技术支持
                </a>
            </div>
        </div>
        
        <footer>
            <p>© 2024 网站名称 | 服务器内部错误</p>
            <div class="footer-links">
                <a href="#"><i class="fas fa-file-alt"></i> 服务条款</a>
                <a href="#"><i class="fas fa-shield-alt"></i> 隐私政策</a>
                <a href="#"><i class="fas fa-headset"></i> 联系我们</a>
                <a href="#"><i class="fas fa-wrench"></i> 系统状态</a>
            </div>
        </footer>
    </div>
    
    <script>
        // 重新加载按钮功能
        document.querySelector('.btn-primary').addEventListener('click', function(e) {
            e.preventDefault();
            alert('重新加载页面...');
            // 在实际应用中，这里应该是 location.reload();
        });
        
        // 技术支持按钮功能
        document.querySelector('.btn-secondary').addEventListener('click', function(e) {
            e.preventDefault();
            alert('联系技术支持...\n此功能在示例中为演示用途，实际网站中会打开联系表单。');
        });
    </script>
</body>
</html>
